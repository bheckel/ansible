---
- name: Ensure fail2ban is installed
  become: true
  dnf:
    name: fail2ban
    state: present

- name: Ensure auditd is running
  become: true
  service:
    name: auditd
    state: started
    enabled: true

#    - name: Install audit logrotate policy
