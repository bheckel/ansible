#                  /usr/sbin/service auditd rotate >/dev/null 2>&1 || true
#              endscript
#          }

- name: Gather facts about disk usage
  command: df -h /var/log/audit
  register: disk_usage
  changed_when: false

- name: Show disk usage
  debug:
    msg: "{{ disk_usage.stdout }}"

- name: Gather facts about memory usage
  command: free -h
  register: mem_usage
  changed_when: false

- name: Show memory usage
  debug:
    msg: "{{ mem_usage.stdout }}"
